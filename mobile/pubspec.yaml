name: yaro0_mobile
description: A Flutter mobile app for the Yaaro0 project.
publish_to: "none"
version: 0.1.0+1
environment:
  sdk: ">=3.4.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  flutter_dotenv: ^5.1.0
  http: ^1.2.2
  flutter_secure_storage: ^10.2.0
  socket_io_client: ^3.1.4
  intl: ^0.20.2
  http_parser: ^4.0.2
  app_links: ^6.1.1
  image_picker: ^1.1.2
  geolocator: ^13.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/brand/logo.png
    - assets/brand/logo-mark.png
